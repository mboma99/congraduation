services:
  backend:
    build: 
      context: ./backend          # Path to the directory containing your backend Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"   # Expose the backend container port, defaulting to 8000 if BACKEND_PORT is not set

  frontend:
    build:
      context: ./frontend         # Path to the directory containing your frontend Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"   # Expose the frontend container port, defaulting to 3000 if FRONTEND_PORT is not set
